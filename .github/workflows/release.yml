name: Build and Release

on:
  push:
    tags: ["v*.*.*", "v*.*.*-*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: ".python-version"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Build
        run: npm run dist

      - name: Create shortcut
        run: |
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut("release\win-unpacked\QLU 工具箱.lnk")
          $shortcut.TargetPath = (Resolve-Path "release\win-unpacked\QLU 工具箱.exe").Path
          $shortcut.WorkingDirectory = (Resolve-Path "release\win-unpacked").Path
          $shortcut.IconLocation = (Resolve-Path "release\win-unpacked\QLU 工具箱.exe").Path + ",0"
          $shortcut.Save()

      - name: Package as zip
        run: |
          $version = "${{ github.ref_name }}"
          $src = (Resolve-Path "release\win-unpacked").Path
          $parent = Split-Path $src -Parent
          Rename-Item $src "QLUToolbox"
          Compress-Archive -Path "$parent\QLUToolbox" -DestinationPath "QLUToolbox_$version.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: QLUToolbox_${{ github.ref_name }}.zip
          generate_release_notes: true
