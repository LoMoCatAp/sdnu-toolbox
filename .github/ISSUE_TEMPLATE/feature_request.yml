name: 功能建议
description: 建议新的校园工具或体验改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: 请描述真实使用场景，不要提交账号、成绩或其他个人信息。
  - type: textarea
    id: problem
    attributes:
      label: 希望解决的问题
      description: 当前遇到了什么不便？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 希望工具如何工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他可选方案
      description: 可选。是否有临时替代方法或参考工具？
  - type: checkboxes
    id: scope
    attributes:
      label: 项目范围确认
      options:
        - label: 该建议面向学生个人非商业使用，并接受本地优先和手动登录原则。
          required: true
