name: Bug 报告
description: 报告可以稳定复现的软件故障
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿提交账号、密码、验证码、Cookie、成绩文件或未经脱敏的日志。涉及安全、隐私或个人信息的问题，请按照 SECURITY.md 通过邮箱私下联系作者。
  - type: input
    id: app-version
    attributes:
      label: QLU 工具箱版本
      placeholder: 例如 1.0.0-alpha.3
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows 版本
      placeholder: 例如 Windows 11 24H2 64 位
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: 发生问题的模块
      options:
        - 软件启动 / 主界面
        - 分项成绩导出
        - 任务记录
        - 设置 / 更新检查
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序说明问题发生前执行的操作。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 已脱敏的错误信息
      description: 可选。请删除姓名、学号、账号、成绩、Cookie 和本机私人路径等信息。
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我确认本 Issue 不包含账号、密码、验证码、Cookie、成绩文件或其他个人信息。
          required: true
